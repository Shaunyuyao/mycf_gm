<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GSMArena Turnstile check</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #ffffff;
}

#ts-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#ts-box {
  text-align: center;
  max-width: 728px;
}

#ts-box p {
  font-size: 18px;
  margin: 30px 30px;
}
#ts-box p.small {
  font-size: 14px;
  margin-top: 0;
}

#ts-box button {
  font-size: 24px;
  padding: 20px 35px;
  width: 300px;
  margin: 30px 0;
  cursor: pointer;

  border: none;
  background: #d50000;
  color: white;
  text-transform: uppercase;
}
#ts-box button:hover {
  background: #db2626;
}
#ts-box button:active {
  background: #c62828;
}

#logo {
  max-width: 320px;
  margin-bottom: 30px;
  margin-left: 4%;
  filter: brightness(0.5);
}

@media (prefers-color-scheme: dark) {
  body {
    background: #212121;
    color: #eeeeee;
  }

  #logo {
    filter: brightness(0.7);
  }
}
</style>


</head>
<body>
    
<div id="ts-wrap">
  <div id="ts-box">
    <img src="https://fdn.gsmarena.com/vv/assets12/i/logo.svg" alt="GSMArena.com" id="logo">
    
    <p>One quick check before you continue...</p>

    <form method="post" action="https://www.gsmarena.com/turnstile-verify.php3">
      <input type="hidden" name="host" value="www.gsmarena.com">
      <input type="hidden" name="return" value="/makers.php3">
      <div class="cf-turnstile" data-sitekey="0x4AAAAAACOgUCNk2xmYkcq8"></div>

      <div style="margin-top:16px;">
        <button type="submit">Continue</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
